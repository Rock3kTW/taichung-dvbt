name: Update Taiwan DVB-T EPG (Taichung)

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install requests lxml

    - name: Generate XMLTV
      run: |
        python generate.py

    - name: Commit and push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add taichung-dvbt.xml
        git commit -m "Auto-update Taiwan DVB-T EPG (Taichung)" || echo "No changes to commit"
        git push

